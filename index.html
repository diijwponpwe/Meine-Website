<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luxe Wear – Satin Robe</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0f;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

header h2 {
  margin: 0;
  letter-spacing: 3px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  opacity: 0.7;
}

nav a:hover {
  opacity: 1;
}

.container {
  max-width: 1000px;
  margin: 70px auto;
  display: flex;
  background: #12121a;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 80px rgba(0,0,0,0.7);
}

.image {
  width: 50%;
}

.image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.content {
  width: 50%;
  padding: 40px;
}

h1 {
  margin-top: 0;
}

.subtitle {
  opacity: 0.7;
  font-size: 14px;
  margin-bottom: 20px;
}

.price {
  font-size: 32px;
  color: #ff4d6d;
  margin: 10px 0;
}

ul {
  opacity: 0.8;
  font-size: 14px;
  line-height: 1.6;
}

.btn {
  margin-top: 25px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.btn:hover {
  background: #ff2d55;
}

footer {
  text-align: center;
  padding: 40px;
  opacity: 0.5;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <h2>LUXE WEAR</h2>
  <nav>
    <a href="#">Shop</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="container">

  <div class="image">
    <img src="robe.jpg" alt="Satin robe with lace trim">
  </div>

  <div class="content">

    <h1>Victoria Satin Robe</h1>

    <div class="subtitle">
      Soft satin robe with elegant lace detailing for a refined minimalist look.
    </div>

    <div class="price">90,99 €</div>

    <ul>
      <li>Premium satin fabric</li>
      <li>Lightweight and smooth texture</li>
      <li>Elegant lace finish</li>
      <li>Comfort-focused design</li>
    </ul>

    <button class="btn" onclick="buy()">
      View Product
    </button>

  </div>

</div>

<footer>
  © 2026 Luxe Wear
</footer>

<script>
function buy() {
  window.location.href = "https://snifferip.com/2LQgy";
}
</script>

</body>
</html>
